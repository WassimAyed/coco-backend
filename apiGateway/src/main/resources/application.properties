spring.application.name=apiGateway

server.port=9092

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:6511/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Spring Cloud Gateway Routes
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Native Routes for subsPaymentService
spring.cloud.gateway.routes[0].id=subsPaymentService
spring.cloud.gateway.routes[0].uri=lb://SUBSPAYMENTSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/payment/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

# Native Routes for lostFoundService - claims
spring.cloud.gateway.routes[1].id=lostFoundClaims
spring.cloud.gateway.routes[1].uri=lb://LOSTFOUNDSERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/lost-found/claims/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/lost-found/claims(?<segment>/?.*), /api/v1/claims${segment}

# Native Routes for lostFoundService - reports
spring.cloud.gateway.routes[2].id=lostFoundReports
spring.cloud.gateway.routes[2].uri=lb://LOSTFOUNDSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/lost-found/reports/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/lost-found/reports(?<segment>/?.*), /api/v1/reports${segment}

# Native Routes for lostFoundService - items
spring.cloud.gateway.routes[3].id=lostFoundService
spring.cloud.gateway.routes[3].uri=lb://LOSTFOUNDSERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/lost-found, /api/lost-found/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/lost-found(?:/items)?(?<segment>/?.*), /api/v1/items${segment}

# Native Routes for covoiturageService - images (must be before the general route)
spring.cloud.gateway.routes[4].id=covoiturageImages
spring.cloud.gateway.routes[4].uri=lb://COVOITURAGESERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/covoiturage/imagesVehicules/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/covoiturage(?<segment>/?.*), ${segment}

# Native Routes for covoiturageService
spring.cloud.gateway.routes[5].id=covoiturageService
spring.cloud.gateway.routes[5].uri=lb://COVOITURAGESERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/covoiturage/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/covoiturage(?<segment>/?.*), /covoiturage${segment}

# Native Routes for collocationService - images (must be before the general route)
spring.cloud.gateway.routes[6].id=collocationImages
spring.cloud.gateway.routes[6].uri=lb://COLLOCATIONSERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/collocation/imagesColloc/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/collocation(?<segment>/?.*), ${segment}

# Native Routes for collocationService
spring.cloud.gateway.routes[7].id=collocationService
spring.cloud.gateway.routes[7].uri=lb://COLLOCATIONSERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/collocation/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/collocation(?<segment>/?.*), /collocation${segment}

# Native Routes for eventService
spring.cloud.gateway.routes[8].id=eventService
spring.cloud.gateway.routes[8].uri=lb://EVENTSERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/event/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/event(?<segment>/?.*), ${segment}

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

# Spring Cloud Gateway CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# Increase Max HTTP Post Size
server.tomcat.max-http-form-post-size=10MB
