spring.application.name=covoiturageService

spring.datasource.url=jdbc:mysql://localhost:3308/CoCoCovoiturageDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

server.port=8092

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# Eureka client
eureka.client.service-url.defaultZone=http://localhost:6511/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
server.address=127.0.0.1
