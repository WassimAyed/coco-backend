name: Build & Push backend images to GHCR

# Quand le workflow se déclenche
on:
  push:
    branches: [ "main", "covoiturageService-branch" ]
    paths:
      - "eurekaServer/**"
      - "apiGateway/**"
      - "userSecurityService/**"
      - "covoiturageService/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch: {}   # permet aussi de lancer le build à la main depuis l'onglet Actions

# Droits dont le workflow a besoin pour publier sur GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: eurekaServer
            image: eureka-server
          - dir: apiGateway
            image: api-gateway
          - dir: userSecurityService
            image: user-security-service
          - dir: covoiturageService
            image: covoiturage-service

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx (push fiable vers GHCR)
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculer le nom de l'image (en minuscules)
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      # 1) On construit l'image SANS la pousser, et on la "charge" dans Docker
      #    pour que Trivy puisse la scanner localement.
      - name: Build ${{ matrix.image }} (local, pas encore de push)
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          file: ./${{ matrix.dir }}/Dockerfile
          load: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}

      # 2) Scan de sécurité Trivy : cherche les vulnérabilités (CVE) dans l'image.
      #    exit-code '0' = signale sans bloquer (mets '1' pour BLOQUER le pipeline si CVE).
      - name: Scan de sécurité Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'

      # 3) Push vers GHCR UNIQUEMENT si le scan est passé (si exit-code '1' et CVE, on n'arrive jamais ici).
      - name: Push ${{ matrix.image }} vers GHCR
        run: |
          docker push ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest
          docker push ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
