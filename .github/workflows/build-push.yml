name: Build & Push backend images to GHCR

# Quand le workflow se déclenche
on:
  push:
    branches: [ "main", "covoiturageService-branch" ]
    paths:
      - "eurekaServer/**"
      - "apiGateway/**"
      - "userSecurityService/**"
      - "covoiturageService/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch: {}   # permet aussi de lancer le build à la main depuis l'onglet Actions

# Droits dont le workflow a besoin pour publier sur GHCR
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: eurekaServer
            image: eureka-server
          - dir: apiGateway
            image: api-gateway
          - dir: userSecurityService
            image: user-security-service
          - dir: covoiturageService
            image: covoiturage-service

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx (push fiable vers GHCR)
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculer le nom de l'image (en minuscules)
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build & Push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.dir }}
          file: ./${{ matrix.dir }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image }}:${{ github.sha }}
