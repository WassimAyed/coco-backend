# PostgreSQL configuration for realestatedb
spring.application.name=realEstateService

spring.datasource.url=jdbc:mysql://localhost:3308/realestate_db?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8094

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:6511/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

server.address=127.0.0.1
