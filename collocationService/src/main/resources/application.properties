spring.application.name=collocationService
spring.datasource.url=jdbc:mysql://localhost:3306/CoCoCollocationDB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.hibernate.ddl-auto=update

server.port=8091

# Eureka client
eureka.client.service-url.defaultZone=http://localhost:6511/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

server.address=127.0.0.1

# Maximum file size for a single file
spring.servlet.multipart.max-file-size=20MB

# Maximum total request size (all files combined)
spring.servlet.multipart.max-request-size=50MB

# Spring Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


