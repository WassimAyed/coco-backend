spring.application.name=serviceEtudiant

# Load environment-specific overrides from .env (optional, gitignored).
# See .env.example for the full list of variables and how to fill them in.
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8098}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/CoCoServiceEtudiantDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

storage.server.base-url=${STORAGE_BASE_URL:http://localhost:3000}
storage.server.upload-path=/api/minio/upload
storage.server.banner-folder=student-services/images
storage.server.chat-folder=student-services/chat-images

app.websocket.endpoint=/ws-student-services
app.websocket.application-prefix=/app
app.websocket.broker-prefix=/topic

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ML moderation service (machine_learning/)
# Set to empty string to disable automatic moderation (services stay PENDING for manual admin review)
ml.service.url=${ML_SERVICE_URL:http://localhost:8002}
# Max seconds to wait for Ollama inference (llava-phi3 on CPU can take ~60-120 s)
ml.service.timeout-seconds=150

spring.cloud.discovery.enabled=${EUREKA_ENABLED:false}
eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:6511/eureka/}
eureka.client.register-with-eureka=${EUREKA_ENABLED:false}
eureka.client.fetch-registry=${EUREKA_ENABLED:false}