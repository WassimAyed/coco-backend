spring.application.name=userSecurityService

# Load environment-specific overrides from .env (optional, gitignored).
# See .env.example for the full list of variables and how to fill them in.
spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8090}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3308/CoCoUserDB?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


# Eureka client
eureka.client.enabled=${EUREKA_ENABLED:true}
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:6511/eureka/}
eureka.client.register-with-eureka=${EUREKA_ENABLED:true}
eureka.client.fetch-registry=${EUREKA_ENABLED:true}

#server.address=127.0.0.1

application.security.jwt.secret-key=${JWT_SECRET_KEY:VGhpcy1pcy1hLWxvY2FsLWRldmVsb3BtZW50LXNlY3JldC1rZXktZm9yLXVzZXJz}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIRATION_MS:604800000}

spring.security.oauth2.client.registration.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Gmail SMTP
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email verification link
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.email-verification.expiration-minutes=5
app.email-verification.max-attempts=3
app.email-verification.resend-cooldown-seconds=300
app.email-verification.url=${EMAIL_VERIFICATION_URL:http://localhost:4200/verify-email}
app.two-factor.expiration-minutes=5
app.two-factor.max-attempts=3
app.two-factor.resend-cooldown-seconds=60
app.two-factor.verification-url=${TWO_FACTOR_VERIFICATION_URL:http://localhost:8090/index.html}
app.storage.base-url=${STORAGE_BASE_URL:http://localhost:3000}
app.storage.upload-path=/api/minio/upload
app.storage.profile-folder=image
app.storage.signal-folder=signals