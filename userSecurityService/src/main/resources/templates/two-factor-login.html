<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Verification</title>
  </head>
  <body style="margin:0; padding:0; background-color:#ffffff; font-family:Arial, Helvetica, sans-serif; color:#0f172a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#ffffff; margin:0; padding:0;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:12px; overflow:hidden;">
            <tr>
              <td align="center" style="background-color:#991b1b; padding:24px;">
                <h1 style="margin:0; font-size:24px; line-height:32px; color:#ffffff; font-weight:bold;">Confirm Your Login</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 24px;">
                <p style="margin:0 0 16px; font-size:16px; line-height:24px; color:#0f172a;">Hello, {{username}}</p>
                <p style="margin:0 0 24px; font-size:16px; line-height:24px; color:#0f172a;">Use this code to complete your login.</p>
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                  <tr>
                    <td align="center" style="background-color:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:20px;">
                      <div style="font-size:32px; line-height:40px; font-weight:bold; letter-spacing:8px; color:#0f172a;">{{otpCode}}</div>
                    </td>
                  </tr>
                </table>
                <p style="margin:24px 0 8px; font-size:14px; line-height:22px; color:#64748b;">This code expires in {{expirationMinutes}} minutes.</p>
                <p style="margin:0 0 32px; font-size:14px; line-height:22px; color:#64748b;">If this wasn't you, change your password immediately.</p>
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                  <tr>
                    <td align="center" bgcolor="#991b1b" style="border-radius:8px;">
                      <a href="{{verificationUrl}}" target="_blank" style="display:inline-block; padding:14px 28px; font-size:16px; font-weight:bold; color:#ffffff; text-decoration:none; background-color:#991b1b; border-radius:8px;">Verify Login</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 24px; border-top:1px solid #e2e8f0; background-color:#f8fafc;">
                <p style="margin:0; font-size:12px; line-height:18px; color:#64748b; text-align:center;">(c) 2026 Your App. All rights reserved.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
