spring.application.name=subsPaymentService

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/subscription_db?createDatabaseIfNotExist=true

spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Client Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:6511/eureka/
eureka.instance.prefer-ip-address=true

# Server Configuration
server.port=8085

# Stripe Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
frontend.url=${FRONTEND_URL:http://localhost:4200}

# Discord Configuration
discord.webhook.url=${DISCORD_WEBHOOK_URL:}

# Mail Configuration (Dummy for local testing)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Error Configuration
server.error.include-message=always
